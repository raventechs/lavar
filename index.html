<!DOCTYPE html>
<html lang="es">
<head>
<!--
  lavAR v2.2
  Fecha: 2026-07-04
  Cambios: Fix login colgado + robustez auth
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lavAR — Sistema de Lavadero</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
/* ... (todo tu CSS se mantiene igual) ... */
:root {
  --bg:#0f1117; --bg2:#181c25; --bg3:#1e2330; --card:#232839;
  --accent:#3b9eff; --accent2:#1a6fd4; --success:#22c55e;
  --warning:#f59e0b; --danger:#ef4444; --text:#e8eaf0; --text2:#9ba3b8;
  --border:#2d3348; --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ... resto de tu CSS sin cambios ... */
</style>
</head>
<body>

<!-- (Todo tu HTML se mantiene exactamente igual hasta el script) -->

<div id="toastContainer"></div>

<script>
// =============================================
//  FIREBASE CONFIG
// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyDVcK9reiQuC6YUpX16DMjyYhtYiH40hbc",
  authDomain: "lavar-b8b84.firebaseapp.com",
  projectId: "lavar-b8b84",
  storageBucket: "lavar-b8b84.firebasestorage.app",
  messagingSenderId: "1064006581602",
  appId: "1:1064006581602:web:fb5f0eea1dcff93d7a003b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// LOG DE ERRORES
function logError(origen, mensaje, extra) {
  try {
    var uid = auth.currentUser ? auth.currentUser.uid : 'anonimo';
    db.collection('errores').add({
      app: 'lavAR', origen: origen,
      mensaje: String(mensaje),
      extra: extra ? String(extra) : null,
      uid: uid,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch(_) {}
}

// =============================================
//  STATE
// =============================================
let currentUser      = null;
let currentRole      = 'owner';
let currentSucId     = null;
let currentSucNombre = '';
let adminPin         = '2580';
let umbralFidel      = 10;
let limiteSucursales = 1;
let features         = { fidelizacion: false, gastos: false, personal: false };
let tapCount         = 0;
let tapTimer         = null;
let pinBuffer        = '';
let ventasHoy        = [];
let linkActual       = '';
let authInitialized  = false;

// =============================================
//  ANIMACIÓN AUTO
// =============================================
function buildCarScene(containerId, scale = 1) {
  // ... tu función actual sin cambios ...
  const el = document.getElementById(containerId);
  if (!el) return;
  const w = Math.round(120 * scale), h = Math.round(80 * scale);
  const drops = Array.from({length:8}, (_,i) => {
    const left = 10 + i * (w / 8);
    const delay = (i * 0.09).toFixed(2);
    const dur   = (0.55 + Math.random() * 0.25).toFixed(2);
    return `<div class="${containerId==='headerCarWrap'?'header-rain':'rain-drop'}"
      style="left:${left}px;top:0;height:${Math.round(18*scale)}px;
      animation-delay:${delay}s;animation-duration:${dur}s;"></div>`;
  }).join('');

  const carColor = '#3b9eff';
  const carW = Math.round(90*scale), carH = Math.round(38*scale);

  el.style.position = 'relative';
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.innerHTML = drops + `
    <svg width="${carW}" height="${carH}" viewBox="0 0 90 38"
      style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);">
      <rect x="5" y="16" width="80" height="18" rx="4" fill="${carColor}" opacity=".9"/>
      <path d="M18 16 Q22 4 38 4 L58 4 Q72 4 76 16Z" fill="${carColor}"/>
      <rect x="22" y="6" width="14" height="9" rx="2" fill="#c8e6ff" opacity=".7"/>
      <rect x="40" y="6" width="14" height="9" rx="2" fill="#c8e6ff" opacity=".7"/>
      <circle cx="22" cy="34" r="6" fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>
      <circle cx="22" cy="34" r="3" fill="#555"/>
      <circle cx="68" cy="34" r="6" fill="#1a1a2e" stroke="#888" stroke-width="1.5"/>
      <circle cx="68" cy="34" r="3" fill="#555"/>
      <rect x="2" y="22" width="8" height="4" rx="2" fill="#ffe082"/>
      <rect x="80" y="22" width="8" height="4" rx="2" fill="#ef5350"/>
    </svg>`;
}

// =============================================
//  INIT — CORREGIDO
// =============================================
window.addEventListener('DOMContentLoaded', () => {
  buildCarScene('loadingCar', 1.2);

  // Listener de auth temprano y seguro
  auth.onAuthStateChanged(async (user) => {
    if (authInitialized) return;
    authInitialized = true;

    const params = new URLSearchParams(window.location.search);
    const codeSuc = params.get('s');

    if (codeSuc) {
      await initEmpleado(codeSuc);
    } else if (user) {
      currentUser = user;
      currentRole = 'owner';
      await initDueno();
    } else {
      hideLoading();
      showLogin();
    }
  });

  // Timeout de seguridad anti-colgado
  setTimeout(() => {
    const loading = document.getElementById('loadingScreen');
    if (loading && loading.style.display !== 'none') {
      console.warn("⏰ Timeout de carga - forzando vista de login");
      hideLoading();
      showLogin();
    }
  }, 8000);
});

async function initEmpleado(codeSuc) {
  try {
    const snap = await db.collection('lavArLinks').doc(codeSuc).get();
    if (!snap.exists) { hideLoading(); showToast('Código inválido', 'danger'); return; }
    const d = snap.data();
    currentSucId = d.sucursalId; currentSucNombre = d.nombre;
    await auth.signInAnonymously();
    currentUser = auth.currentUser; currentRole = 'employee';
    hideLoading(); initUI();
  } catch(e) { 
    console.error(e);
    hideLoading(); 
    showToast('Error: ' + e.message, 'danger'); 
  }
}

async function initDueno() {
  try {
    const cfg = await db.collection('config').doc(currentUser.uid).get();
    if (cfg.exists) {
      const d = cfg.data();
      adminPin         = d.pin             || '1990';
      umbralFidel      = d.umbral          || 10;
      limiteSucursales = d.limiteSucursales|| 1;
      features         = d.features        || { fidelizacion:false, gastos:false, personal:false };
    }
  } catch(e) {
    console.error("Error cargando config:", e);
    logError('initDueno', e);
  }

  if (!currentSucId) {
    try {
      const sucs = await db.collection('sucursales')
        .where('ownerUid','==',currentUser.uid).limit(1).get();
      if (!sucs.empty) {
        currentSucId = sucs.docs[0].id;
        currentSucNombre = sucs.docs[0].data().nombre;
      }
    } catch(e) {}
  }
  hideLoading(); 
  initUI();
}

// ... (el resto de tus funciones se mantienen igual: initUI, applyFeatureFlags, doLogin, etc.)

function hideLoading() {
  const s = document.getElementById('loadingScreen');
  if (!s) return;
  s.classList.add('hidden');
  setTimeout(() => s.style.display = 'none', 600);
}

function showLogin() { 
  document.getElementById('loginScreen').classList.add('active'); 
}

// Resto de tu código (AUTH, TABS, VENTAS, etc.) sin cambios...

</script>
</body>
</html>
