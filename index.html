<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lavAR — Sistema de Lavadero</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#181c25; --bg3:#1e2330; --card:#232839;
  --accent:#3b9eff; --accent2:#1a6fd4; --success:#22c55e;
  --warning:#f59e0b; --danger:#ef4444; --text:#e8eaf0; --text2:#9ba3b8;
  --border:#2d3348; --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#loadingScreen.hidden{opacity:0;pointer-events:none;}

/* AUTO ANIMADO */
.car-scene{position:relative;width:160px;height:100px;margin-bottom:16px;}
.rain-drop{position:absolute;width:2px;border-radius:2px;background:linear-gradient(to bottom,transparent,#60b8ff);animation:rainFall 0.7s linear infinite;}
@keyframes rainFall{from{transform:translateY(-30px);opacity:1;}to{transform:translateY(80px);opacity:0;}}
.header-rain{position:absolute;top:0;width:1.5px;border-radius:1px;background:linear-gradient(to bottom,transparent,#60b8ff);animation:rainFall 0.6s linear infinite;}

/* Resto de estilos (mantengo los mismos que tenías) */
.login-card{background:var(--card);border-radius:12px;padding:36px 28px;width:100%;max-width:380px;border:1px solid var(--border);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;}
.btn-primary{background:var(--accent);color:#fff;width:100%;}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:14px;}
.table-wrap{overflow-x:auto;}
.toast{background:var(--card);color:var(--text);border-left:4px solid var(--accent);padding:11px 16px;border-radius:8px;}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="car-scene" id="loadingCar"></div>
  <div class="loading-title">lavAR</div>
  <div class="loading-sub">Iniciando sistema...</div>
</div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div id="loginCar" style="width:90px;height:60px;margin:0 auto 8px;position:relative;"></div>
      <h1>lavAR 🚗</h1>
      <p>Sistema de gestión para lavaderos</p>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="tu@email.com"/></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="divider"><span>o</span></div>
    <button class="btn btn-google" onclick="doLoginGoogle()">Ingresar con Google</button>
  </div>
</div>

<div id="appShell" style="display:none;flex-direction:column;min-height:100vh;">
  <!-- Header, Nav, Main content (mantengo simplificado para que funcione) -->
  <header style="background:#181c25;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;">
    <div>lavAR</div>
    <button onclick="doLogout()">Salir</button>
  </header>
  <main style="padding:16px;">
    <div id="tab-historial">
      <button onclick="filtrarHistorial()">Cargar Historial</button>
      <div class="table-wrap">
        <table><tbody id="historialBody"></tbody></table>
      </div>
    </div>
  </main>
</div>

<div id="toastContainer"></div>

<script>
// FIREBASE
const firebaseConfig = { /* tu config */ 
  apiKey: "AIzaSyDVcK9reiQuC6YUpX16DMjyYhtYiH40hbc",
  authDomain: "lavar-b8b84.firebaseapp.com",
  projectId: "lavar-b8b84",
  storageBucket: "lavar-b8b84.firebasestorage.app",
  messagingSenderId: "1064006581602",
  appId: "1:1064006581602:web:fb5f0eea1dcff93d7a003b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentSucId = null;
let authInitialized = false;

window.addEventListener('DOMContentLoaded', () => {
  auth.onAuthStateChanged(user => {
    if (authInitialized) return;
    authInitialized = true;
    if (user) {
      currentUser = user;
      document.getElementById('appShell').style.display = 'flex';
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  });
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return alert("Completá email y contraseña");
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    alert("Error: " + e.message);
  }
}

async function filtrarHistorial() {
  if (!currentSucId) return alert("No hay sucursal");
  const desde = document.getElementById('filtroDesde') ? document.getElementById('filtroDesde').value : "2026-01-01";
  const hasta = document.getElementById('filtroHasta') ? document.getElementById('filtroHasta').value : "2026-12-31";

  try {
    const snap = await db.collection('ventas')
      .where('sucursalId', '==', currentSucId)
      .where('fechaStr', '>=', desde)
      .where('fechaStr', '<=', hasta)
      .orderBy('fechaStr', 'desc')
      .get();

    console.log("Ventas cargadas:", snap.size);
    // Aquí iría el renderizado
    alert("Historial cargado correctamente (" + snap.size + " ventas)");
  } catch(e) {
    console.error(e);
    alert("Error de índice. Esperá unos minutos o verifica el índice en Firebase.");
  }
}

function showToast(msg) {
  alert(msg); // temporal
}
</script>
</body>
</html>
