<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>lavAR — Sistema de Lavadero</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg:#0f1117; --bg2:#181c25; --card:#232839;
  --accent:#3b9eff; --text:#e8eaf0;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;}
.card{background:var(--card);padding:20px;margin:16px;border-radius:12px;}
.btn{background:var(--accent);color:white;padding:12px;border:none;border-radius:8px;width:100%;}
</style>
</head>
<body>

<div id="loadingScreen" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div style="font-size:60px;margin-bottom:20px;">🚗</div>
  <div style="font-size:28px;color:var(--accent);">lavAR</div>
</div>

<div id="loginScreen" style="display:none;padding:20px;">
  <div class="card">
    <h1 style="text-align:center;color:var(--accent);">lavAR</h1>
    <input id="loginEmail" type="email" placeholder="Email" style="width:100%;padding:12px;margin:10px 0;"/>
    <input id="loginPass" type="password" placeholder="Contraseña" style="width:100%;padding:12px;margin:10px 0;"/>
    <button class="btn" onclick="doLogin()">Ingresar</button>
    <button class="btn" onclick="doLoginGoogle()" style="background:white;color:black;margin-top:10px;">Google</button>
  </div>
</div>

<div id="appShell" style="display:none;">
  <div class="card">
    <h2>Historial</h2>
    <button class="btn" onclick="filtrarHistorial()">Cargar Historial</button>
    <div id="historialBody" style="margin-top:20px;"></div>
  </div>
</div>

<script>
// Config Firebase
firebase.initializeApp({
  apiKey: "AIzaSyDVcK9reiQuC6YUpX16DMjyYhtYiH40hbc",
  authDomain: "lavar-b8b84.firebaseapp.com",
  projectId: "lavar-b8b84"
});
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentSucId = null;

window.addEventListener('load', () => {
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById('appShell').style.display = 'block';
      document.getElementById('loadingScreen').style.display = 'none';
    } else {
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('loadingScreen').style.display = 'none';
    }
  });
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return alert("Completá los datos");
  try { await auth.signInWithEmailAndPassword(email, pass); } 
  catch(e) { alert(e.message); }
}

async function doLoginGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch(e) { alert(e.message); }
}

async function filtrarHistorial() {
  if (!currentUser) return;
  try {
    const snap = await db.collection('ventas').limit(20).get();
    let html = '';
    snap.forEach(doc => {
      const v = doc.data();
      html += `<p>${v.fechaStr || ''} - ${v.servicio || ''} - $${v.precio}</p>`;
    });
    document.getElementById('historialBody').innerHTML = html || '<p>Sin datos</p>';
  } catch(e) {
    alert("Error: " + e.message);
  }
}
</script>
</body>
</html>
